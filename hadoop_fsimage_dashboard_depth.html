            font-size: 1.2rem;
        }

            margin-left: auto;
            transition: transform 0.3s ease;
        }

        .section-header.collapsed .toggle {
            transform: rotate(-90deg);
        }

            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 20px;
            padding: 25px;
            background: #fafbfc;
        }

        .section-content.collapsed {
            display: none;
        }

            background: white;
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 3px 10px rgba(0,0,0,0.1);

            color: #4f46e5;
            margin-bottom: 15px;
            font-size: 1.1rem;
            font-weight: 600;
            border-bottom: 2px solid #e5e7eb;
            padding-bottom: 8px;
        }

            width: 100%;
            border-collapse: collapse;

        }

            background: #f8fafc;

            text-align: left;
            font-weight: 600;
            color: #374151;
            border-bottom: 2px solid #e5e7eb;

            padding: 10px 8px;
            border-bottom: 1px solid #f3f4f6;
        }

        .data-table tr:hover {
            background: #f8fafc;
        }

            position: relative;
            height: 300px;
            margin-bottom: 20px;
        }

            font-size: 0.95rem;
            line-height: 1.6;

            color: #dc2626;
            margin: 15px 0 8px 0;
            font-size: 1rem;
        }

        .insights ul {
            margin: 10px 0;
            padding-left: 20px;
        }

        .insights li {
            margin: 5px 0;
            color: #4b5563;
        }

        .summary-cards {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .summary-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 25px;
            border-radius: 15px;
            text-align: center;
            box-shadow: 0 10px 25px rgba(0,0,0,0.15);
            transition: transform 0.3s ease;
        }

        .summary-card:hover {
            transform: translateY(-5px);
        }

        .summary-card .number {
            font-size: 2rem;
            font-weight: bold;
            margin-bottom: 5px;
        }

        .summary-card .label {
            font-size: 0.9rem;
            opacity: 0.9;
        }

            text-align: center;
            padding: 50px;
            color: #6b7280;
        }

            width: 40px;
            height: 40px;
            border: 4px solid #e5e7eb;
            border-top: 4px solid #4f46e5;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }

            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }

            .section-content {

            }

                flex-wrap: wrap;
            }

                margin: 5px;

                                        if (user.size.includes('PB')) {

                                        } else {

                                        }
                                        // 计算平均文件大小
                                        const avgFileSizeKB = Math.round(sizeInKB / user.files);
                                        // 转换为合适的显示单位
                                        let displaySize, unit;
                                        if (avgFileSizeKB >= 1024 * 1024) {
                                            displaySize = Math.round(avgFileSizeKB / (1024 * 1024));

                                        // 判断是否为小文件问题（小于64MB为小文件）

                                            return `<li><strong>🔴 ${user.user} 用户</strong>：${formatNumber(user.files)} 个文件仅占用 ${user.size}，平均文件大小约 ${displaySize}${unit}，存在小文件问题</li>`;

        function toggleSection(header) {
            const content = header.nextElementSibling;
            const toggle = header.querySelector('.toggle');
            
            if (content.classList.contains('collapsed')) {
                content.classList.remove('collapsed');
                header.classList.remove('collapsed');
                toggle.textContent = '▼';
            } else {
                content.classList.add('collapsed');
                header.classList.add('collapsed');
                toggle.textContent = '▶';
            }
        }
